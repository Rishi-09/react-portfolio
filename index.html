
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rishi Kumar | Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Inter+Tight:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #050505;
        --accent-color: #6D7CFF;
        --surface-color: #0F0F0F;
        --text-color: #F0F2F5;
        --text-secondary: #8A8E98;
        --border-color: #1A1A1A;
        --selection-color: rgba(109, 124, 255, 0.3);
      }

      .light {
        --bg-color: #F5F5F7;
        --accent-color: #2563EB;
        --surface-color: #FFFFFF;
        --text-color: #0F172A;
        --text-secondary: #64748B;
        --border-color: #E5E7EB;
        --selection-color: rgba(37, 99, 235, 0.1);
      }
      
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
        transition: background-color 0.8s cubic-bezier(0.23, 1, 0.32, 1), color 0.5s ease;
      }

      /* Paper Grain Effect */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      
      
      h1, h2, h3, h4 {
        font-family: 'Inter Tight', sans-serif;
      }

      .main-content {
        position: relative;
        z-index: 10;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }
      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }

      @keyframes scroll {
        from { transform: translateX(0); }
        to { transform: translateX(calc(-50% - 1.5rem)); }
      }
      .animate-scroll {
        animation: scroll var(--animation-duration, 40s) var(--animation-direction, forwards) linear infinite;
      }
    </style>

</head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
